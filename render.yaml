services:
  - type: web
    name: smc-ftmo-dashboard
    env: python
    buildCommand: pip install -r cloud/requirements.txt
    startCommand: uvicorn cloud.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PUSH_TOKEN
        generateValue: true
      - key: ACCESS_TOKEN
        generateValue: true
      - key: SECRET_KEY
        value: ""
