services:
  - type: web
    name: smc-ftmo-dashboard
    env: python
    buildCommand: pip install --upgrade pip && pip install -r cloud/requirements.txt
    startCommand: gunicorn cloud.app:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --workers 1
    envVars:
      - key: PUSH_TOKEN
        generateValue: true
      - key: ACCESS_TOKEN
        generateValue: true
      # SECRET_KEY (opcional) — cifra contraseñas en BD
      # Genera: python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # Pégalo manualmente en Environment → Add env var
